name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Unit tests
        run: python3 -m unittest discover -s tests -t .
      - name: Syntax-check JS
        run: git ls-files '*.js' | xargs -r -n1 node --check
      - name: Byte-compile Python
        run: git ls-files '*.py' | xargs -r python3 -m py_compile

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check tag matches VERSION
        run: |
          v="$(cat VERSION)"
          [ "$GITHUB_REF_NAME" = "v$v" ] || { echo "tag $GITHUB_REF_NAME != VERSION $v"; exit 1; }
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
